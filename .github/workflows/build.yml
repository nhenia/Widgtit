name: Build Widgtit

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: widgtit-apk
        path: app/build/outputs/apk/debug/*.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: widgtit-apk
        path: app/build/outputs/apk/debug/

    - name: Get Version
      id: get_version
      run: |
        MAJOR=$(grep 'MAJOR' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
        MINOR=$(grep 'MINOR' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
        echo "tag=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

    - name: Tag Repository
      run: |
        TAG="${{ steps.get_version.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists"
        else
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
        fi

    - name: Create Pre-Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        files: app/build/outputs/apk/debug/*.apk
        prerelease: true
        name: Widgtit Pre-release ${{ steps.get_version.outputs.tag }}
        body: |
          New build for Widgtit version ${{ steps.get_version.outputs.tag }}.
          This is an automated pre-release build.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
